<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GÖZ Store | Admin CRM</title>
  <link class="apple-touch-icon" rel="apple-touch-icon" href="https://i.postimg.cc/0jXyVbyq/goz-luxury-icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-body: #0b0b0c;
      --bg-card: #121214;
      --bg-input: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.07);
      --text-main: #f5f5f7;
      --text-muted: #a1a1a6;
      --gold: #dfba6b;
      --gold-dark: #b89344;
      --shadow: rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
    body { background: var(--bg-body); color: var(--text-main); padding-bottom: 60px; }
    header { background: rgba(18, 18, 19, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); color: var(--gold); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(223, 186, 107, 0.15); }
    .brand-title { font-size: 18px; font-weight: 900; letter-spacing: 3px; }
    .top-action-btn { background: rgba(223, 186, 107, 0.1); border: 1px solid rgba(223, 186, 107, 0.2); color: var(--gold); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .order-badge { background: #ef4444; color: white; font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: bold; }
    .container { max-width: 600px; margin: 20px auto; padding: 0 12px; }
    .admin-section { background: var(--bg-card); border-radius: 24px; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 25px; box-shadow: 0 10px 30px var(--shadow); }
    .section-title { font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px; color: var(--gold); }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
    .input-field, select { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); padding: 14px; border-radius: 12px; color: #fff; font-size: 15px; outline: none; }
    .input-field:focus, select:focus { border-color: var(--gold); }
    .btn-submit { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #0b0b0c; width: 100%; padding: 16px; font-size: 15px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; margin-top: 10px; }
    .product-list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
    .prod-meta { display: flex; align-items: center; gap: 12px; }
    .prod-img { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; background: #1c1c1e; }
    .prod-title { font-weight: 600; color: #fff; font-size: 14px; }
    .prod-price { color: var(--gold); font-size: 13px; font-weight: 700; }
    .btn-delete { background: none; border: none; color: #ef4444; font-size: 14px; font-weight: 600; cursor: pointer; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 200; }
    .modal-box { background: var(--bg-card); border-radius: 24px; width: 95%; max-width: 550px; padding: 24px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(223, 186, 107, 0.15); position: relative; }
    .close-modal { position: absolute; top: 18px; right: 18px; font-size: 24px; color: var(--text-muted); cursor: pointer; background: none; border: none; }
    .order-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .order-header { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 10px; }
    .order-row { display: flex; margin-bottom: 6px; font-size: 14px; }
    .order-label { width: 100px; color: var(--text-muted); }
    .order-value { font-weight: 600; color: #fff; }
  </style>
</head>
<body>

  <header>
    <div class="brand-title">GÖZ ADMIN CRM</div>
    <button class="top-action-btn" onclick="openOrdersModal()">
      📋 ЗАКАЗЫ <span id="ordersCount" class="order-badge">0</span>
    </button>
  </header>

  <div class="container">
    <div class="admin-section">
      <div class="section-title">Добавить Новый Товар</div>
      <form id="productForm" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
          <label>Название товара</label>
          <input type="text" id="title" class="input-field" placeholder="Например: Очки Cartier Gold" required>
        </div>
        
        <div class="form-group">
          <label>Категория</label>
          <select id="category" required>
            <option value="Очки">Очки</option>
            <option value="Очки для зрения">Очки для зрения</option>
            <option value="Женская одежда">Женская одежда</option>
            <option value="Туфли">Туфли</option>
            <option value="Сумочки">Сумочки</option>
            <option value="Ремонт очков">Ремонт очков</option>
          </select>
        </div>

        <div class="form-group">
          <label>Цена (TMT)</label>
          <input type="number" id="price" class="input-field" placeholder="1500" required>
        </div>

        <div class="form-group">
          <label>Описание</label>
          <textarea id="description" class="input-field" rows="3" placeholder="Премиальное качество..."></textarea>
        </div>

        <div class="form-group">
          <label>Ссылки на фото товара (можно одну или несколько через запятую)</label>
          <input type="text" id="imageUrl" class="input-field" placeholder="https://site.com/foto1.jpg, https://site.com/foto2.jpg" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Опубликовать на витрину</button>
      </form>
    </div>

    <div class="admin-section">
      <div class="section-title">Текущая витрина сайта</div>
      <div id="productsAdminList">⏳ Загрузка витрины...</div>
    </div>
  </div>

  <div id="ordersModal" class="modal-overlay" onclick="closeOrdersModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <button class="close-modal" onclick="document.getElementById('ordersModal').style.display='none'">&times;</button>
      <div class="section-title" style="margin-bottom: 20px;">📋 Все поступающие заказы</div>
      <div id="ordersContainer"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://wocvffbthbylgftgvyve.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvY3ZmZmJ0aGJ5bGdmdGd2eXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4ODg3ODksImV4cCI6MjAzMjQ2NDc4OX0.VkZfX2stQWxIdmxhTkNDdlJ1WGlwZFlmSUZzN2ktbkoxQ0dfSmluYV9V";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleFormSubmit(event) {
      event.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = "⏳ Опубликация..."; btn.disabled = true;

      const title = document.getElementById('title').value.trim();
      const category = document.getElementById('category').value;
      const price = document.getElementById('price').value;
      const description = document.getElementById('description').value.trim();
      const image = document.getElementById('imageUrl').value.trim();

      try {
        const { error } = await supabase.from('products').insert([{ title, category, price, description, image }]);
        if (error) throw error;
        alert("🎉 Товар добавлен!");
        document.getElementById('productForm').reset();
        loadProducts();
      } catch (err) {
        alert("Ошибка: " + err.message);
      } finally {
        btn.innerText = "Опубликовать на витрину"; btn.disabled = false;
      }
    }

    async function loadProducts() {
      const container = document.getElementById('productsAdminList');
      try {
        const { data, error } = await supabase.from('products').select('*').order('id', { ascending: false });
        if (error) throw error;
        container.innerHTML = '';
        data.forEach(item => {
          const firstImg = item.image ? item.image.split(',')[0].trim() : '';
          const row = document.createElement('div');
          row.className = 'product-list-item';
          row.innerHTML = `
            <div class="prod-meta">
              <img src="${firstImg}" class="prod-img" onerror="this.src='https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=100'">
              <div class="prod-details">
                <div class="prod-title">${item.title}</div>
                <div class="prod-price">${item.price} TMT</div>
              </div>
            </div>
            <button class="btn-delete" onclick="deleteProduct(${item.id})">Удалить</button>
          `;
          container.appendChild(row);
        });
      } catch (err) { container.innerText = "Ошибка загрузки."; }
    }

    async function deleteProduct(id) {
      if (confirm("Удалить товар?")) {
        await supabase.from('products').delete().eq('id', id);
        loadProducts();
      }
    }

    async function loadOrders() {
      try {
        const { data, error } = await supabase.from('orders').select('*').order('id', { ascending: false });
        if (error || !data) return;
        document.getElementById('ordersCount').innerText = data.length;
        const container = document.getElementById('ordersContainer');
        container.innerHTML = '';
        data.forEach(order => {
          const card = document.createElement('div');
          card.className = 'order-card';
          card.innerHTML = `
            <div class="order-header"><span>ЗАКАЗ №${order.id}</span></div>
            <div class="order-row"><div class="order-label">Клиент:</div><div class="order-value">${order.name}</div></div>
            <div class="order-row"><div class="order-label">Телефон:</div><div class="order-value"><a href="tel:${order.phone}" style="color:#38bdf8;">${order.phone}</a></div></div>
            <div class="order-row"><div class="order-label">Товар:</div><div class="order-value">${order.product_title}</div></div>
            <div class="order-row"><div class="order-label">Сумма:</div><div class="order-value" style="color:var(--gold);">${order.price} TMT</div></div>
          `;
          container.appendChild(card);
        });
      } catch (err) {}
    }

    function openOrdersModal() { document.getElementById('ordersModal').style.display = 'flex'; loadOrders(); }
    function closeOrdersModal(e) { if (e.target.id === 'ordersModal') document.getElementById('ordersModal').style.display = 'none'; }
    loadProducts(); loadOrders(); setInterval(loadOrders, 15000);
  </script>
</body>
</html>
