<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÖZ Store | Premium Boutique</title>
    
    <!-- Автономный скрипт EmailJS (локальный файл) -->
    <script type="text/javascript" src="email.js"></script>
    
    <script type="text/javascript">
        (function() {
            // Инициализация EmailJS (замени на свой Public Key, если он другой)
            emailjs.init("user_live_settings_key"); 
        })();
    </script>

    <script>
       const SUPABASE_URL = 'https://tewshpcmudtkbosuqxry.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRld3NocGNtdWR0a2Jvc3VxeHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDQ1NzQsImV4cCI6MjA5NTIyMDU3NH0.kkRjbr-10ChYi6dcGnsjIN4iArkX2Z60XAPG6MxKY6c';

        // Прямой запрос к базе данных Supabase через REST API
        async function loadProducts() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!res.ok) throw new Error('Ошибка сети Supabase');
                
                const products = await res.json();
                renderProducts(products);
                
            } catch (error) {
                console.error("Ошибка загрузки коллекции:", error);
                const container = document.getElementById('products-container');
                if (container) {
                    container.innerHTML = '<p class="error">Не удалось загрузить коллекцию товаров</p>';
                }
            }
        }

        // Отрисовка карточек товаров в DOM
        function renderProducts(products) {
            const container = document.getElementById('products-container');
            if (!container) return;
            
            container.innerHTML = '';
            
            if (products.length === 0) {
                container.innerHTML = '<p class="empty">Каталог пуст</p>';
                return;
            }

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="price">${product.price} TMT</p>
                        <button class="btn-buy" onclick="addToCart(${product.id}, '${product.name}', ${product.price})">
                            Заказать
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Простая корзина (Vanilla JS)
        let cart = [];

        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            updateCartUI();
            openCartModal();
        }

        function updateCartUI() {
            const countElem = document.getElementById('cart-count');
            const totalElem = document.getElementById('cart-total');
            const itemsContainer = document.getElementById('cart-items');
            
            if (countElem) countElem.innerText = cart.length;
            
            if (itemsContainer) {
                itemsContainer.innerHTML = '';
                let total = 0;
                cart.forEach((item, index) => {
                    total += item.price;
                    const itemRow = document.createElement('div');
                    itemRow.className = 'cart-item';
                    itemRow.innerHTML = `
                        <span>${item.name}</span>
                        <span>${item.price} TMT <button onclick="removeFromCart(${index})">❌</button></span>
                    `;
                    itemsContainer.appendChild(itemRow);
                });
                if (totalElem) totalElem.innerText = total;
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function openCartModal() {
            const modal = document.getElementById('cart-modal');
            if (modal) modal.classList.add('active');
        }

        function closeCartModal() {
            const modal = document.getElementById('cart-modal');
            if (modal) modal.classList.remove('active');
        }

        // Отправка быстрого заказа через EmailJS без перезагрузки страницы
        async function sendOrder(event) {
            event.preventDefault();
            const phone = document.getElementById('customer-phone').value;
            
            if (cart.length === 0) {
                alert('Ваша корзина пуста!');
                return;
            }

            if (!phone) {
                alert('Пожалуйста, введите номер телефона!');
                return;
            }

            const orderDetails = cart.map(item => `${item.name} (${item.price} TMT)`).join(', ');
            const totalPrice = cart.reduce((sum, item) => sum + item.price, 0);

            const templateParams = {
                phone: phone,
                order_details: orderDetails,
                total_price: `${totalPrice} TMT`
            };

            const btn = document.getElementById('btn-submit-order');
            if (btn) {
                btn.disabled = true;
                btn.innerText = 'Отправка...';
            }

            try {
                // Отправка данных на твой EmailJS сервис
                await emailjs.send('service_default', 'template_order', templateParams);
                alert('Заказ успешно отправлен! Мы свяжемся с вами в ближайшее время.');
                cart = [];
                updateCartUI();
                closeCartModal();
                document.getElementById('order-form').reset();
            } catch (error) {
                console.error('Ошибка EmailJS:', error);
                alert('Произошла ошибка при отправке заказа. Пожалуйста, попробуйте еще раз.');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = 'Подтвердить заказ';
                }
            }
        }

        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>

    <style>
        /* Легкие, быстрые стили для мобильных low-end устройств */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #fafafa; color: #222; padding-bottom: 60px; }
        header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; sticky: top; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: 1px; }
        .cart-icon { position: relative; cursor: pointer; background: none; border: none; font-size: 1.2rem; }
        #cart-count { position: absolute; top: -8px; right: -10px; background: #000; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; }
        
        .hero { background: #000; color: #fff; padding: 40px 20px; text-align: center; }
        .hero h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .hero p { font-size: 0.9rem; opacity: 0.8; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .product-card { background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; }
        .product-image { aspect-ratio: 1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .product-info h3 { font-size: 0.95rem; margin-bottom: 6px; font-weight: 600; }
        .product-info .price { font-weight: 700; color: #000; font-size: 1rem; margin-bottom: 10px; }
        .btn-buy { background: #000; color: #fff; border: none; padding: 8px; border-radius: 4px; font-weight: 600; font-size: 0.85rem; cursor: pointer; width: 100%; }
        
        /* Модальное окно корзины */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 1000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: #fff; width: 100%; border-radius: 16px 16px 0 0; padding: 20px; max-height: 80%; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.95rem; }
        .cart-item button { background: none; border: none; margin-left: 10px; cursor: pointer; }
        .cart-summary { margin: 20px 0; text-align: right; font-weight: 700; font-size: 1.1rem; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #666; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .btn-submit { background: #28a745; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 700; font-size: 1rem; cursor: pointer; width: 100%; }
        .btn-submit:disabled { background: #ccc; }

        .error, .empty { grid-column: 1 / -1; text-align: center; color: #666; padding: 40px 20px; font-size: 0.95rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">GÖZ STORE</div>
        <button class="cart-icon" onclick="openCartModal()">
            🛍️ <span id="cart-count">0</span>
        </button>
    </header>

    <section class="hero">
        <h1>Премиум Коллекция Очков</h1>
        <p>Стиль, качество и защита для ваших глаз</p>
    </section>

    <main class="container">
        <div class="grid" id="products-container">
            <!-- Сюда JavaScript динамически подгрузит товары -->
            <p class="empty">Загрузка каталога...</p>
        </div>
    </main>

    <!-- Модалка оформления заказа -->
    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ваш заказ</h2>
                <button class="close-btn" onclick="closeCartModal()">&times;</button>
            </div>
            
            <div id="cart-items">
                <!-- Выбранные очки -->
            </div>
            
            <div class="cart-summary">
                Итого: <span id="cart-total">0</span> TMT
            </div>

            <form id="order-form" onsubmit="sendOrder(event)">
                <div class="form-group">
                    <label for="customer-phone">Номер телефона для связи (Телеграм / IMO)</label>
                    <input type="tel" id="customer-phone" placeholder="+993 6X XX-XX-XX" required>
                </div>
                <button type="submit" class="btn-submit" id="btn-submit-order">Подтвердить заказ</button>
            </form>
        </div>
    </div>

</body>
</html>
