<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GÖZ Store | Premium Boutique</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GÖZ Store">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/0jXyVbyq/goz-luxury-icon.png">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
    body { background: #0b0b0c; color: #f5f5f7; padding-bottom: 60px; -webkit-font-smoothing: antialiased; }
    
    header { 
      background: rgba(18, 18, 19, 0.8); 
      backdrop-filter: blur(25px); 
      -webkit-backdrop-filter: blur(25px); 
      color: #dfba6b; 
      padding: 20px; 
      text-align: center; 
      font-size: 24px; 
      font-weight: 900; 
      letter-spacing: 5px; 
      position: sticky; 
      top: 0; 
      z-index: 100; 
      border-bottom: 1px solid rgba(223, 186, 107, 0.15);
      text-shadow: 0 2px 10px rgba(223, 186, 107, 0.2);
    }
    
    .categories { display: flex; gap: 12px; padding: 20px 14px; overflow-x: auto; scrollbar-width: none; }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn { 
      background: rgba(255, 255, 255, 0.04); 
      color: #a1a1a6; 
      padding: 12px 24px; 
      border-radius: 30px; 
      border: 1px solid rgba(255, 255, 255, 0.08); 
      font-size: 14px; 
      cursor: pointer; 
      white-space: nowrap; 
      font-weight: 600; 
      transition: all 0.3s ease; 
    }
    .cat-btn.active { 
      background: #dfba6b; 
      color: #0b0b0c; 
      border-color: #dfba6b;
      box-shadow: 0 4px 20px rgba(223, 186, 107, 0.4); 
      transform: translateY(-2px); 
    }

    .container { max-width: 600px; margin: 0 auto; padding: 8px; }
    .loading, .empty { text-align: center; padding: 80px 20px; color: #86868b; font-size: 16px; font-weight: 500; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { 
      background: #121214; 
      border-radius: 22px; 
      padding: 14px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
      border: 1px solid rgba(255, 255, 255, 0.03); 
      cursor: pointer; 
    }
    .card:active { transform: scale(0.96); border-color: rgba(223, 186, 107, 0.3); }
    
    .card-img-wrap { 
      width: 100%; 
      aspect-ratio: 1 / 1; 
      overflow: hidden; 
      border-radius: 16px; 
      background: #1c1c1e; 
      border: 1px solid rgba(255, 255, 255, 0.02);
    }
    .card img { width: 100%; height: 100%; object-fit: cover; }
    
    .card-info { padding: 12px 4px 2px 4px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
    .card-title { font-size: 15px; font-weight: 600; color: #f5f5f7; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 42px; }
    .card-price { color: #dfba6b; font-weight: 700; font-size: 17px; margin-bottom: 14px; letter-spacing: 0.5px; }
    
    .order-btn { 
      background: rgba(255, 255, 255, 0.06); 
      color: #f5f5f7; 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      width: 100%; 
      padding: 12px; 
      border-radius: 12px; 
      font-weight: 600; 
      font-size: 13px; 
      cursor: pointer; 
      letter-spacing: 0.5px; 
      transition: all 0.2s; 
    }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: none; justify-content: center; align-items: flex-end; z-index: 200; }
    .modal-box { 
      background: #121214; 
      border-radius: 30px 30px 0 0; 
      width: 100%; 
      max-width: 550px; 
      padding: 30px 24px 24px 24px; 
      max-height: 90vh; 
      overflow-y: auto; 
      position: relative; 
      animation: slideUp 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
      border-top: 1px solid rgba(223, 186, 107, 0.2);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .modal-line { width: 50px; height: 5px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; margin: -15px auto 20px auto; }
    .close-modal { position: absolute; top: 20px; right: 20px; font-size: 22px; color: #a1a1a6; cursor: pointer; border: none; background: rgba(255, 255, 255, 0.05); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    
    .modal-img-wrap { width: 100%; max-height: 240px; overflow: hidden; border-radius: 20px; background: #1c1c1e; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05); }
    .modal-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .modal-title { font-size: 22px; font-weight: 700; color: #ffffff; margin: 20px 0 8px 0; line-height: 1.3; }
    .modal-price { font-size: 26px; color: #dfba6b; font-weight: 800; margin-bottom: 15px; letter-spacing: 0.5px; }
    
    .modal-desc-title { font-size: 11px; color: #86868b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .modal-desc { font-size: 14px; color: #e1e1e6; line-height: 1.5; margin-bottom: 20px; padding: 14px; border-radius: 14px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
    
    .order-checkout-fields { 
      display: none; 
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease;
      margin-top: 15px; 
    }
    .order-checkout-fields.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }
    
    .input-field { 
      width: 100%; 
      background: rgba(255, 255, 255, 0.03); 
      border: 1px solid rgba(255, 255, 255, 0.07); 
      padding: 16px; 
      border-radius: 14px; 
      color: #fff; 
      font-size: 16px; 
      margin-bottom: 14px; 
      transition: all 0.3s; 
    }
    .input-field:focus { 
      border-color: #dfba6b; 
      outline: none; 
      background: rgba(255, 255, 255, 0.06); 
      box-shadow: 0 0 15px rgba(223, 186, 107, 0.1);
    }
    
    .modal-box .action-btn { 
      background: linear-gradient(135deg, #dfba6b 0%, #b89344 100%); 
      color: #0b0b0c; 
      width: 100%;
      padding: 18px; 
      font-size: 16px; 
      font-weight: 700; 
      border: none; 
      border-radius: 16px; 
      box-shadow: 0 6px 25px rgba(223, 186, 107, 0.25); 
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .action-btn:active { transform: scale(0.98); }
    .action-btn:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }
  </style>
</head>
<body>

  <header>GÖZ STORE</header>

  <div class="container">
    <div class="categories">
      <button class="cat-btn active" onclick="filterCategory('Все')">Все коллекции</button>
      <button class="cat-btn" onclick="filterCategory('Очки')">Очки</button>
      <button class="cat-btn" onclick="filterCategory('Очки для зрения')">Очки для зрения</button>
      <button class="cat-btn" onclick="filterCategory('Женская одежда')">Женская одежда</button>
      <button class="cat-btn" onclick="filterCategory('Туфли')">Туфли</button>
      <button class="cat-btn" onclick="filterCategory('Сумочки')">Сумочки</button>
      <button class="cat-btn" onclick="filterCategory('Ремонт очков')">Ремонт очков</button>
    </div>

    <div id="loading" class="loading">⏳ Загрузка лимитированной коллекции GÖZ...</div>
    <div id="catalog" class="grid" style="display: none;"></div>
    <div id="empty" class="empty" style="display: none;">В этой категории пока нет новинок</div>
  </div>

  <div id="productModal" class="modal-overlay" onclick="closeProductModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-line"></div>
      <button class="close-modal" onclick="document.getElementById('productModal').style.display='none'">&times;</button>
      
      <div class="modal-img-wrap">
        <img id="modalImg" class="modal-img" src="" alt="">
      </div>
      
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalPrice" class="modal-price"></div>
      
      <div id="detailsBlock">
        <div class="modal-desc-title">Эксклюзивные детали</div>
        <div id="modalDesc" class="modal-desc"></div>
      </div>
      
      <div id="checkoutFields" class="order-checkout-fields">
        <div class="modal-desc-title">Контактные данные для заказа</div>
        <input type="text" id="clientName" class="input-field" placeholder="Ваше имя" required>
        <input type="tel" id="clientPhone" class="input-field" placeholder="Номер телефона (+993...)" required>
      </div>

      <button id="mainActionBtn" class="action-btn" onclick="handleMainButtonClick()">Быстрый заказ в 1 клик</button>
    </div>
  </div>

  <script>
    let allProducts = [];
    let currentCategory = 'Все';
    let selectedItem = null;
    let isCheckoutStage = false;

    const googleFormSubmitUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSeiIVydTlmSuEoxSN-9fvVYZy0hwZUnEWq_8O5q3v3XtBhl0w/formResponse';

    const formFieldsIds = {
      productTitle: 'entry.410943806',  
      category: 'entry.1745484898',      
      name: 'entry.1011850125',           
      phone: 'entry.556272304'         
    };

    function cleanGoogleDriveLink(url) {
      if (!url) return '';
      if (url.includes('drive.google.com')) {
        let id = '';
        if (url.includes('/file/d/')) { id = url.split('/file/d/')[1].split('/')[0]; }
        else if (url.includes('/d/')) { id = url.split('/d/')[1].split('/')[0]; }
        else if (url.includes('id=')) { id = url.split('id=')[1].split('&')[0]; }
        if (id) return `https://docs.google.com/uc?export=view&id=${id}`;
      }
      return url;
    }

    async function loadProducts() {
      try {
        const res = await fetch('/api/products');
        if (!res.ok) throw new Error();
        allProducts = await res.json();
        renderCatalog();
      } catch (err) {
        document.getElementById('loading').innerText = 'Не удалось загрузить коллекцию';
      }
    }

    function filterCategory(catName) {
      currentCategory = catName;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        const isAll = catName === 'Все' && btn.innerText === 'Все коллекции';
        btn.classList.toggle('active', isAll || btn.innerText === catName);
      });
      renderCatalog();
    }

    function openProductModal(item) {
      selectedItem = item;
      isCheckoutStage = false;

      document.getElementById('modalImg').src = cleanGoogleDriveLink(item.image);
      document.getElementById('modalTitle').innerText = item.title;
      document.getElementById('modalPrice').innerText = `${item.price} TMT`;
      document.getElementById('modalDesc').innerText = item.description || 'Описание премиального качества.';
      
      document.getElementById('detailsBlock').style.display = 'block';
      document.getElementById('checkoutFields').classList.remove('show');
      
      const btn = document.getElementById('mainActionBtn');
      btn.style.background = 'linear-gradient(135deg, #dfba6b 0%, #b89344 100%)';
      btn.innerText = 'Быстрый заказ в 1 клик';
      btn.disabled = false;
      
      document.getElementById('productModal').style.display = 'flex';
    }

    function closeProductModal(event) {
      if(event.target.id === 'productModal') {
        document.getElementById('productModal').style.display = 'none';
      }
    }

    function handleMainButtonClick() {
      if (!isCheckoutStage) {
        document.getElementById('detailsBlock').style.display = 'none';
        document.getElementById('checkoutFields').classList.add('show');
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('mainActionBtn').innerText = 'Подтвердить заказ';
        isCheckoutStage = true;
      } else {
        submitOrderDirectly();
      }
    }

    // ✨ ФУНКЦИЯ ГЕНЕРАЦИИ И СКАЧИВАНИЯ КАРТОЧКИ-ЧЕКА
    function generateAndDownloadReceipt(clientName) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      // Задаем премиальный размер инвойс-карточки
      canvas.width = 600;
      canvas.height = 850;

      // 1. Фон (Темный люкс)
      ctx.fillStyle = '#0b0b0c';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Рамка цвета бледного золота
      ctx.strokeStyle = 'rgba(223, 186, 107, 0.2)';
      ctx.lineWidth = 4;
      ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

      // 2. Шапка брендового чека
      ctx.fillStyle = '#dfba6b';
      ctx.font = 'bold 32px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GÖZ STORE', canvas.width / 2, 80);

      ctx.fillStyle = '#86868b';
      ctx.font = '16px -apple-system, sans-serif';
      ctx.fillText('PREMIUM BOUTIQUE RECEIPT', canvas.width / 2, 110);

      // Декоративная золотая разделительная линия
      ctx.fillStyle = 'rgba(223, 186, 107, 0.3)';
      ctx.fillRect(50, 130, canvas.width - 100, 2);

      // 3. Вывод картинки товара по центру чека
      const originalImg = document.getElementById('modalImg');
      const productImg = new Image();
      productImg.crossOrigin = 'anonymous'; 
      productImg.src = originalImg.src;

      productImg.onload = function() {
        // Отрисовка фото товара в рамке
        const imgSize = 300;
        const imgX = (canvas.width - imgSize) / 2;
        const imgY = 160;
        
        ctx.fillStyle = '#121214';
        ctx.fillRect(imgX, imgY, imgSize, imgSize);
        ctx.drawImage(productImg, imgX, imgY, imgSize, imgSize);
        
        // Рисуем рамку вокруг картинки
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 1;
        ctx.strokeRect(imgX, imgY, imgSize, imgSize);

        drawTextData();
      };

      productImg.onerror = function() {
        // Если картинка из внешнего облака заблокирована по CORS, рисуем стильную заглушку вместо нее
        const imgSize = 300;
        const imgX = (canvas.width - imgSize) / 2;
        const imgY = 160;
        ctx.fillStyle = '#121214';
        ctx.fillRect(imgX, imgY, imgSize, imgSize);
        ctx.fillStyle = 'rgba(223, 186, 107, 0.1)';
        ctx.font = 'italic 20px -apple-system, sans-serif';
        ctx.fillText('Exclusive Premium Item', canvas.width / 2, imgY + (imgSize / 2));
        
        drawTextData();
      };

      function drawTextData() {
        // 4. Информация о товаре
        ctx.textAlign = 'left';
        
        // Название товара
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px -apple-system, sans-serif';
        const titleText = selectedItem.title.length > 35 ? selectedItem.title.substring(0, 35) + '...' : selectedItem.title;
        ctx.fillText(titleText, 50, 520);

        // Цена товара
        ctx.fillStyle = '#dfba6b';
        ctx.font = 'bold 28px -apple-system, sans-serif';
        ctx.fillText(`${selectedItem.price} TMT`, 50, 565);

        // Разделительная линия
        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.fillRect(50, 595, canvas.width - 100, 1);

        // Детали покупателя
        ctx.fillStyle = '#86868b';
        ctx.font = '16px -apple-system, sans-serif';
        ctx.fillText('Покупатель:', 50, 630);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 18px -apple-system, sans-serif';
        ctx.fillText(clientName, 170, 630);

        // Дата и время заказа
        const now = new Date();
        const dateStr = now.toLocaleDateString('ru-RU');
        const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

        ctx.fillStyle = '#86868b';
        ctx.font = '16px -apple-system, sans-serif';
        ctx.fillText('Время заказа:', 50, 670);
        ctx.fillStyle = '#ffffff';
        ctx.font = '18px -apple-system, sans-serif';
        ctx.fillText(`${dateStr} в ${timeStr}`, 170, 670);

        // Разделительная линия
        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.fillRect(50, 710, canvas.width - 100, 1);

        // 5. Слова благодарности
        ctx.textAlign = 'center';
        ctx.fillStyle = '#dfba6b';
        ctx.font = 'italic 18px -apple-system, sans-serif';
        ctx.fillText('Спасибо вам за покупку! Ждем вас снова.', canvas.width / 2, 760);

        // 6. Инициируем скачивание файла на устройство
        const link = document.createElement('a');
        link.download = `GOZ-Order-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
    }

    async function submitOrderDirectly() {
      const name = document.getElementById('clientName').value.trim();
      const phone = document.getElementById('clientPhone').value.trim();
      const btn = document.getElementById('mainActionBtn');

      if (!name || !phone) {
        alert('Пожалуйста, заполните поля «Ваше имя» и «Номер телефона».');
        return;
      }

      btn.innerText = '⏳ Оформление заказа...';
      btn.disabled = true;

      const formData = new URLSearchParams();
      formData.append(formFieldsIds.productTitle, selectedItem.title);
      formData.append(formFieldsIds.category, selectedItem.category);
      formData.append(formFieldsIds.name, name);
      formData.append(formFieldsIds.phone, phone);

      // Запускаем мгновенную генерацию и автоскачивание карточки чека
      try {
        generateAndDownloadReceipt(name);
      } catch (e) {
        console.log('Ошибка генерации чека, продолжаем отправку формы.');
      }

      try {
        await fetch(googleFormSubmitUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: formData.toString()
        });

        btn.style.background = '#00b67a';
        btn.innerText = '✅ Успешно заказано! Чек скачан';
        setTimeout(() => {
          document.getElementById('productModal').style.display = 'none';
        }, 1500);

      } catch (error) {
        alert('Произошла ошибка при отправке. Попробуйте еще раз.');
        btn.innerText = 'Подтвердить заказ';
        btn.disabled = false;
      }
    }

    function renderCatalog() {
      const catalogDiv = document.getElementById('catalog');
      const emptyDiv = document.getElementById('empty');
      const loadingDiv = document.getElementById('loading');
      
      loadingDiv.style.display = 'none';
      catalogDiv.innerHTML = '';

      const filtered = currentCategory === 'Все' 
        ? allProducts 
        : allProducts.filter(p => p.category === currentCategory);

      if (filtered.length === 0) {
        catalogDiv.style.display = 'none';
        emptyDiv.style.display = 'block';
        return;
      }

      emptyDiv.style.display = 'none';
      catalogDiv.style.display = 'grid';

      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openProductModal(item);
        card.innerHTML = `
          <div class="card-img-wrap">
            <img src="${cleanGoogleDriveLink(item.image)}" alt="" loading="lazy">
          </div>
          <div class="card-info">
            <div class="card-title">${item.title}</div>
            <div>
              <div class="card-price">${item.price} TMT</div>
              <button class="order-btn">Посмотреть</button>
            </div>
          </div>
        `;
        catalogDiv.appendChild(card);
      });
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    loadProducts();
  </script>
</body>
</html>
