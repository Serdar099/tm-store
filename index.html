<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GÖZ Store | Premium Boutique</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GÖZ Store">
  <link class="apple-touch-icon" rel="apple-touch-icon" href="https://i.postimg.cc/0jXyVbyq/goz-luxury-icon.png">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <style>
    :root {
      --bg-body: #0b0b0c;
      --bg-card: #121214;
      --bg-input: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.07);
      --text-main: #f5f5f7;
      --text-muted: #a1a1a6;
      --gold: #dfba6b;
      --gold-dark: #b89344;
      --shadow: rgba(0, 0, 0, 0.5);
    }

    [data-theme="light"] {
      --bg-body: #0f2042; 
      --bg-card: #1a315e; 
      --bg-input: rgba(255, 255, 255, 0.07);
      --border-color: rgba(255, 255, 255, 0.15);
      --text-main: #ffffff;
      --text-muted: #cbd5e1;
      --gold: #fcd34d; 
      --gold-dark: #f59e0b;
      --shadow: rgba(15, 32, 66, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
    body { background: var(--bg-body); color: var(--text-main); padding-bottom: 60px; -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }
    
    header { 
      background: rgba(18, 18, 19, 0.85); 
      backdrop-filter: blur(25px); 
      -webkit-backdrop-filter: blur(25px); 
      color: var(--gold); 
      padding: 15px 20px; 
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; 
      top: 0; 
      z-index: 100; 
      border-bottom: 1px solid rgba(223, 186, 107, 0.15);
    }
    
    .brand-title { font-size: 20px; font-weight: 900; letter-spacing: 4px; text-shadow: 0 2px 10px rgba(223, 186, 107, 0.2); cursor: pointer; }
    .nav-icons { display: flex; align-items: center; gap: 15px; }
    .icon-btn { background: none; border: none; color: var(--text-main); font-size: 20px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; width: 35px; height: 35px; border-radius: 50%; transition: background 0.2s; }
    .badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; }

    /* Бургер-меню */
    .burger-menu { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: #121214; z-index: 250; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); box-shadow: 5px 0 30px rgba(0,0,0,0.7); border-right: 1px solid rgba(223, 186, 107, 0.15); padding: 30px 20px; display: flex; flex-direction: column; }
    .burger-menu.open { transform: translateX(0); }
    .burger-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 240; display: none; }
    .menu-title { font-size: 12px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
    .menu-close { align-self: flex-end; font-size: 24px; color: #86868b; background: none; border: none; cursor: pointer; margin-bottom: 10px; }
    .cat-list { display: flex; flex-direction: column; gap: 8px; }
    .cat-item { background: rgba(255, 255, 255, 0.02); color: #f5f5f7; border: 1px solid rgba(255, 255, 255, 0.05); padding: 14px 18px; border-radius: 12px; text-align: left; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .cat-item.active { background: var(--gold); color: #0b0b0c; border-color: var(--gold); }
    .lang-section { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
    .lang-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .lang-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(223, 186, 107, 0.1); }

    /* Поиск */
    .search-container { max-width: 600px; margin: 15px auto 5px auto; padding: 0 16px; }
    .search-bar { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); padding: 14px 16px; border-radius: 14px; font-size: 15px; outline: none; }
    .search-bar:focus { border-color: var(--gold); }

    /* Каталог */
    .container { max-width: 600px; margin: 0 auto; padding: 8px; }
    .loading, .empty { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 16px; font-weight: 500; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: var(--bg-card); border-radius: 22px; padding: 14px; box-shadow: 0 10px 30px var(--shadow); display: flex; flex-direction: column; justify-content: space-between; position: relative; }
    
    .like-btn { position: absolute; top: 22px; right: 22px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 16px; color: #a1a1a6; }
    .like-btn.liked { color: #ef4444; }

    .card-img-wrap { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 16px; background: #1c1c1e; cursor: pointer; }
    .card img { width: 100%; height: 100%; object-fit: cover; }
    .card-info { padding: 12px 4px 2px 4px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; cursor: pointer; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text-main); line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 42px; }
    .card-price { color: var(--gold); font-weight: 700; font-size: 17px; margin-bottom: 14px; letter-spacing: 0.5px; }
    .order-btn { background: rgba(255, 255, 255, 0.06); color: var(--text-main); border: 1px solid var(--border-color); width: 100%; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 13px; cursor: pointer; }

    /* Модалка со Слайдером */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: none; justify-content: center; align-items: flex-end; z-index: 200; }
    .modal-box { background: var(--bg-card); border-radius: 30px 30px 0 0; width: 100%; max-width: 550px; padding: 30px 24px 24px 24px; max-height: 90vh; overflow-y: auto; position: relative; border-top: 1px solid rgba(223, 186, 107, 0.2); }
    .close-modal { position: absolute; top: 20px; right: 20px; font-size: 22px; color: var(--text-muted); cursor: pointer; border: none; background: rgba(255, 255, 255, 0.05); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
    
    /* Слайдер */
    .slider-container { width: 100%; position: relative; overflow: hidden; border-radius: 20px; background: #1c1c1e; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 10px; }
    .slider-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .slider-track::-webkit-scrollbar { display: none; }
    .slider-slide { min-width: 100%; aspect-ratio: 4 / 3; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: zoom-in; }
    .slider-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .slider-dots { display: flex; justify-content: center; gap: 6px; margin: 8px 0 15px 0; }
    .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: background 0.2s; }
    .dot.active { background: var(--gold); width: 18px; border-radius: 3px; }

    /* Полноэкранный Zoom */
    .zoom-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 300; display: none; justify-content: center; align-items: center; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .zoom-img { max-width: 95%; max-height: 85vh; object-fit: contain; border-radius: 8px; }
    .zoom-close { position: absolute; top: 25px; right: 25px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 28px; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    .modal-title { font-size: 22px; font-weight: 700; color: #fff; margin: 10px 0 8px 0; line-height: 1.3; }
    .modal-price { font-size: 26px; color: var(--gold); font-weight: 800; margin-bottom: 15px; letter-spacing: 0.5px; }
    .modal-desc-title { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .modal-desc { font-size: 14px; color: var(--text-main); line-height: 1.5; margin-bottom: 20px; padding: 14px; border-radius: 14px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); }
    
    .order-checkout-fields { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; margin-top: 15px; }
    .order-checkout-fields.show { display: block; opacity: 1; transform: translateY(0); }
    .input-field { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); padding: 16px; border-radius: 14px; color: #fff; font-size: 16px; margin-bottom: 14px; }
    .input-field:focus { border-color: var(--gold); outline: none; }
    
    .modal-box .action-btn { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #0b0b0c; width: 100%; padding: 18px; font-size: 16px; font-weight: 700; border: none; border-radius: 16px; box-shadow: 0 6px 25px rgba(223, 186, 107, 0.25); cursor: pointer; }
    .action-btn:disabled { background: #333; color: #666; box-shadow: none; }
  </style>
</head>

      <div id="modalTitle" class="modal-title"></div>

      <div id="detailsBlock">

      <div id="checkoutFields" class="order-checkout-fields">
        <div class="modal-desc-title" id="lblCheckoutTitle">Контактные данные для заказа</div>
        <input type="text" id="clientName" class="input-field" placeholder="Ваше имя" required>
        <input type="tel" id="clientPhone" class="input-field" placeholder="Номер телефона (+993...)" required>

      <button id="mainActionBtn" class="action-btn" onclick="handleMainButtonClick()">Быстрый заказ в 1 клик</button>

  <script>

    let currentCategory = 'Все';
    let selectedItem = null;
    let isCheckoutStage = false;
    let currentLanguage = 'ru';
    let favorites = JSON.parse(localStorage.getItem('goz_favorites')) || [];
    let isFavoritesMode = false;
// ОТКЛЮЧИ ЭТУ СТРОКУ:

    const translations = {

        orderBtn1: "Быстрый заказ в 1 клик",

        success: "✅ Успешно заказано! Чек скачан",

        alertError: "Произошла ошибка при отправке. Попробуйте еще раз.",
        receiptTitle: "PREMIUM BOUTIQUE RECEIPT",
        receiptBuyer: "Покупатель:",
        receiptTime: "Время заказа:",
        receiptThanks: "Спасибо вам за покупку! Ждем вас снова.",
        favEmpty: "В списке избранного пока пусто ♡"
      },
      tm: {
        loading: "⏳ GÖZ ekskluziw kolleksiýasy ýüklenýär...",
        error: "Kolleksiýany ýükläp bolmady",
        empty: "Bu kategoriýada entek täzelik ýok",
        searchPlaceholder: "Ekskluziw modelleri gözle...",
        allCats: "Ähli kolleksiýalar",
        categoriesTitle: "Kolleksiýalar",

        details: "Ekskluziw detallar",

        namePlaceholder: "Adyňyz",

        orderBtn1: "1 basymda sargyt etmek",
        orderBtn2: "Sargydy tassyklamak",
        sending: "⏳ Sargyt resmileşdirilýär...",
        success: "✅ Sargyt edildi! Çek ýüklenildi",
        alertFields: "Hahyş, «Adyňyz» we «Telefon belgiňiz» meýdançalaryny dolduryň.",
        alertError: "Ugratmakda säwlik ýüze çykdy. Täzeden synanyşyň.",
        receiptTitle: "PREMIUM BUTIK ÇEKI",

      },
      en: {
        loading: "⏳ Loading GÖZ limited collection...",
        error: "Failed to load collection",
        empty: "No new arrivals in this category yet",
        searchPlaceholder: "Search exclusive models...",
        allCats: "All Collections",
        categoriesTitle: "Collections",
        viewBtn: "View Details",
        details: "Exclusive Details",
        checkoutTitle: "Contact Information for Order",
        namePlaceholder: "Your Name",
        phonePlaceholder: "Phone Number (+993...)",
        orderBtn1: "Quick 1-Click Order",
        orderBtn2: "Confirm Order",
        sending: "⏳ Processing your order...",
        success: "✅ Order Placed! Receipt Downloaded",
        alertFields: "Please fill out 'Your Name' and 'Phone Number' fields.",
        alertError: "An error occurred. Please try again.",
        receiptTitle: "PREMIUM BOUTIQUE RECEIPT",
        receiptBuyer: "Buyer:",
        receiptTime: "Order Time:",
        receiptThanks: "Thank you for your purchase! Welcome back.",
        favEmpty: "Your wishlist is empty ♡"
      }
    };

    function cleanGoogleDriveLink(url) {
      if (!url) return '';
      if (url.includes('drive.google.com')) {
        let id = '';
        if (url.includes('/file/d/')) { id = url.split('/file/d/')[1].split('/')[0]; }
        else if (url.includes('/d/')) { id = url.split('/d/')[1].split('/')[0]; }
        else if (url.includes('id=')) { id = url.split('id=')[1].split('&')[0]; }
        if (id) return `https://docs.google.com/uc?export=view&id=${id}`;
      }
      return url.trim();
    }

    async function loadProducts() {
      try {
        const res = await fetch('/api/products');
        if (!res.ok) throw new Error();
        allProducts = await res.json();
        updateFavoritesBadge();
        renderCatalog();
      } catch (err) {
        document.getElementById('loading').innerText = translations[currentLanguage].error;
      }
    }

    function toggleMenu(show) {
      document.getElementById('burgerMenu').classList.toggle('open', show);
      document.getElementById('burgerOverlay').style.display = show ? 'block' : 'none';
    }

    function filterCategory(catName) {
      currentCategory = catName;
      isFavoritesMode = false;
      document.getElementById('favIcon').innerText = '♡';
      document.querySelectorAll('.cat-item').forEach(btn => {
        const isAll = catName === 'Все' && btn.id === 'btnAllCats';
        btn.classList.toggle('active', isAll || btn.innerText === catName);
      });
      toggleMenu(false);
      renderCatalog();
    }

    function resetFilters() {
      document.getElementById('searchBar').value = '';
      filterCategory('Все');
    }

    function toggleFavorite(id, event) {
      event.stopPropagation();
      const index = favorites.indexOf(id);
      if (index === -1) { favorites.push(id); } else { favorites.splice(index, 1); }
      localStorage.setItem('goz_favorites', JSON.stringify(favorites));
      updateFavoritesBadge();
      renderCatalog();
    }

    function updateFavoritesBadge() {
      const count = favorites.length;
      const badge = document.getElementById('favCount');
      if (count > 0) { badge.innerText = count; badge.style.display = 'block'; } else { badge.style.display = 'none'; }
    }

    function toggleFavoritesMode() {
      isFavoritesMode = !isFavoritesMode;
      document.getElementById('favIcon').innerText = isFavoritesMode ? '♥' : '♡';
      renderCatalog();
    }

    function handleSearch() { renderCatalog(); }
    
    function toggleTheme() {
      if (document.body.getAttribute('data-theme') === 'light') { document.body.removeAttribute('data-theme'); } 
      else { document.body.setAttribute('data-theme', 'light'); }
    }

    function setLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => { btn.classList.toggle('active', btn.innerText.toLowerCase() === lang); });
      document.getElementById('searchBar').placeholder = translations[lang].searchPlaceholder;
      document.getElementById('lblCategories').innerText = translations[lang].categoriesTitle;
      document.getElementById('btnAllCats').innerText = translations[lang].allCats;
      document.getElementById('loading').innerText = translations[lang].loading;
      document.getElementById('lblDetails').innerText = translations[lang].details;
      document.getElementById('lblCheckoutTitle').innerText = translations[lang].checkoutTitle;
      document.getElementById('clientName').placeholder = translations[lang].namePlaceholder;
      document.getElementById('clientPhone').placeholder = translations[lang].phonePlaceholder;
      document.getElementById('mainActionBtn').innerText = isCheckoutStage ? translations[lang].orderBtn2 : translations[lang].orderBtn1;
      renderCatalog();
    }

    function openProductModal(idxInFiltered) {
      const itemElement = document.getElementById(`prod-${idxInFiltered}`);
      if (!itemElement) return;
      
      const item = JSON.parse(itemElement.getAttribute('data-product'));
      selectedItem = item;
      isCheckoutStage = false;

      const imagesArr = item.image.split(',').map(url => cleanGoogleDriveLink(url)).filter(url => url !== '');
      
      const track = document.getElementById('sliderTrack');
      const dotsContainer = document.getElementById('sliderDots');
      track.innerHTML = '';
      dotsContainer.innerHTML = '';

      imagesArr.forEach((imgUrl, idx) => {
        const slide = document.createElement('div');
        slide.className = 'slider-slide';
        slide.onclick = () => openZoom(imgUrl);
        slide.innerHTML = `<img src="${imgUrl}" alt="">`;
        track.appendChild(slide);

        if (imagesArr.length > 1) {
          const dot = document.createElement('div');
          dot.className = `dot ${idx === 0 ? 'active' : ''}`;
          dotsContainer.appendChild(dot);
        }
      });

      track.scrollLeft = 0;

      document.getElementById('modalTitle').innerText = item.title;
      document.getElementById('modalPrice').innerText = `${item.price} TMT`;
      document.getElementById('modalDesc').innerText = item.description || 'Premium Quality Product.';
      
      document.getElementById('detailsBlock').style.display = 'block';
      document.getElementById('checkoutFields').classList.remove('show');
      
      const btn = document.getElementById('mainActionBtn');
      btn.innerText = translations[currentLanguage].orderBtn1;
      btn.disabled = false;
      
      document.getElementById('productModal').style.display = 'flex';
    }

    function updateSliderDots() {
      const track = document.getElementById('sliderTrack');
      const dots = document.querySelectorAll('.slider-dots .dot');
      if(dots.length === 0) return;
      
      const index = Math.round(track.scrollLeft / track.clientWidth);
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === index);
      });
    }

    function openZoom(imgUrl) {
      document.getElementById('zoomImg').src = imgUrl;
      document.getElementById('zoomOverlay').style.display = 'flex';
    }

    function closeZoom() {
      document.getElementById('zoomOverlay').style.display = 'none';
    }

    function closeProductModal(event) {
      if(event.target.id === 'productModal') {
        document.getElementById('productModal').style.display = 'none';
      }
    }

    function handleMainButtonClick() {
      if (!isCheckoutStage) {
        document.getElementById('detailsBlock').style.display = 'none';
        document.getElementById('checkoutFields').classList.add('show');
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('mainActionBtn').innerText = translations[currentLanguage].orderBtn2;
        isCheckoutStage = true;
      } else {
        submitOrderDirectly();
      }
    }

    function generateAndDownloadReceipt(clientName) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 600;
      canvas.height = 850;

      const isLightTheme = document.body.getAttribute('data-theme') === 'light';
      ctx.fillStyle = isLightTheme ? '#0f2042' : '#0b0b0c';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = isLightTheme ? 'rgba(252, 211, 77, 0.3)' : 'rgba(223, 186, 107, 0.2)';
      ctx.lineWidth = 4;
      ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

      ctx.fillStyle = isLightTheme ? '#fcd34d' : '#dfba6b';
      ctx.font = 'bold 32px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GÖZ STORE', canvas.width / 2, 80);

      ctx.fillStyle = isLightTheme ? '#cbd5e1' : '#86868b';
      ctx.font = '16px -apple-system, sans-serif';
      ctx.fillText(translations[currentLanguage].receiptTitle, canvas.width / 2, 110);

      ctx.fillStyle = isLightTheme ? 'rgba(252, 211, 77, 0.3)' : 'rgba(223, 186, 107, 0.3)';
      ctx.fillRect(50, 130, canvas.width - 100, 2);

      const firstImgUrl = selectedItem.image.split(',')[0];
      const productImg = new Image();
      productImg.crossOrigin = 'anonymous'; 
      productImg.src = cleanGoogleDriveLink(firstImgUrl);

      productImg.onload = function() {
        const imgSize = 300;
        const imgX = (canvas.width - imgSize) / 2;
        const imgY = 160;
        ctx.fillStyle = isLightTheme ? '#1a315e' : '#121214';
        ctx.fillRect(imgX, imgY, imgSize, imgSize);
        ctx.drawImage(productImg, imgX, imgY, imgSize, imgSize);
        drawTextData();
      };

      productImg.onerror = function() {
        const imgSize = 300;
        const imgX = (canvas.width - imgSize) / 2;
        const imgY = 160;
        ctx.fillStyle = isLightTheme ? '#1a315e' : '#121214';
        ctx.fillRect(imgX, imgY, imgSize, imgSize);
        drawTextData();
      };

      function drawTextData() {
        ctx.textAlign = 'left';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px -apple-system, sans-serif';
        const titleText = selectedItem.title.length > 35 ? selectedItem.title.substring(0, 35) + '...' : selectedItem.title;
        ctx.fillText(titleText, 50, 520);

        ctx.fillStyle = isLightTheme ? '#fcd34d' : '#dfba6b';
        ctx.font = 'bold 28px -apple-system, sans-serif';
        ctx.fillText(`${selectedItem.price} TMT`, 50, 565);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.fillRect(50, 595, canvas.width - 100, 1);

        ctx.fillStyle = isLightTheme ? '#cbd5e1' : '#86868b';
        ctx.font = '16px -apple-system, sans-serif';
        ctx.fillText(translations[currentLanguage].receiptBuyer, 50, 630);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 18px -apple-system, sans-serif';
        ctx.fillText(clientName, 180, 630);

        const now = new Date();
        const dateStr = now.toLocaleDateString('ru-RU');
        const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

        ctx.fillStyle = isLightTheme ? '#cbd5e1' : '#86868b';
        ctx.font = '16px -apple-system, sans-serif';
        ctx.fillText(translations[currentLanguage].receiptTime, 50, 670);
        ctx.fillStyle = '#ffffff';
        ctx.font = '18px -apple-system, sans-serif';
        ctx.fillText(`${dateStr} - ${timeStr}`, 180, 670);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.fillRect(50, 710, canvas.width - 100, 1);

        ctx.textAlign = 'center';
        ctx.fillStyle = isLightTheme ? '#fcd34d' : '#dfba6b';
        ctx.font = 'italic 18px -apple-system, sans-serif';
        ctx.fillText(translations[currentLanguage].receiptThanks, canvas.width / 2, 760);

        const link = document.createElement('a');
        link.download = `GOZ-Receipt-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
    }

    async function submitOrderDirectly() {
      const name = document.getElementById('clientName').value.trim();
      const phone = document.getElementById('clientPhone').value.trim();
      const btn = document.getElementById('mainActionBtn');

      if (!name || !phone) { alert(translations[currentLanguage].alertFields); return; }

      btn.innerText = translations[currentLanguage].sending;
      btn.disabled = true;

      try { generateAndDownloadReceipt(name); } catch (e) {}

      // Параметры для автоматического заполнения шаблона EmailJS
      const templateParams = {
        productTitle: selectedItem.title,
        category: selectedItem.category,
        phone: phone,
        name: name
      };

      // Прямая отправка письма без выхода из приложения
      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
        .then(() => {
          btn.style.background = '#00b67a';
          btn.innerText = translations[currentLanguage].success;
          setTimeout(() => { document.getElementById('productModal').style.display = 'none'; }, 1500);
        })
        .catch((error) => {
          console.error("EmailJS Error:", error);
          alert(translations[currentLanguage].alertError);
          btn.innerText = translations[currentLanguage].orderBtn2;
          btn.disabled = false;
        });
    }

    function renderCatalog() {
      const catalogDiv = document.getElementById('catalog');
      const emptyDiv = document.getElementById('empty');
      document.getElementById('loading').style.display = 'none';
      catalogDiv.innerHTML = '';

      const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
      let filtered = allProducts;

      if (isFavoritesMode) {
        filtered = filtered.filter(p => favorites.includes(p.id || p.title));
      } else if (currentCategory !== 'Все') {
        filtered = filtered.filter(p => p.category === currentCategory);
      }

      if (searchQuery) {
        filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery) || (p.description && p.description.toLowerCase().includes(searchQuery)));
      }

      if (filtered.length === 0) {
        catalogDiv.style.display = 'none';
        emptyDiv.style.display = 'block';
        emptyDiv.innerText = isFavoritesMode ? translations[currentLanguage].favEmpty : translations[currentLanguage].empty;
        return;
      }

      emptyDiv.style.display = 'none';
      catalogDiv.style.display = 'grid';

      filtered.forEach((item, index) => {
        const itemId = item.id || item.title;
        const isLiked = favorites.includes(itemId);
        const firstImgUrl = item.image.split(',')[0];
        
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `prod-${index}`;
        card.setAttribute('data-product', JSON.stringify(item));
        
        card.innerHTML = `
          <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleFavorite('${itemId}', event)">
            ${isLiked ? '♥' : '♡'}
          </button>
          <div class="card-img-wrap" onclick="openProductModal(${index})">
            <img src="${cleanGoogleDriveLink(firstImgUrl)}" alt="" loading="lazy">
          </div>
          <div class="card-info" onclick="openProductModal(${index})">
            <div class="card-title">${item.title}</div>
            <div>
              <div class="card-price">${item.price} TMT</div>
              <button class="order-btn">${translations[currentLanguage].viewBtn}</button>
            </div>
          </div>
        `;
        catalogDiv.appendChild(card);
      });
    }

    loadProducts();
  </script>
</body>
</html>
